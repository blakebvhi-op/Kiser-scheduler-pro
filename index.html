<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kiser Schedule Pro</title>
<meta name="theme-color" content="#E2703A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Kiser Schedule" />

<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Righteous&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#FBF1DE; --cream2:#FFF9EE; --card:#FFFCF4;
  --orange:#E2703A; --rust:#C85A30; --mustard:#EFA92E; --sun:#F6C453;
  --sage:#8AA079; --olive:#6E834F; --rose:#E59A9A; --mauve:#C77FA0;
  --teal:#5AA0A0; --ink:#4A3429; --ink2:#7A5C4B; --line:#EAD9BC;
  --shadow:0 6px 0 rgba(74,52,41,.12), 0 14px 28px rgba(74,52,41,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Quicksand",system-ui,sans-serif;
  color:var(--ink);
  background:var(--cream);
  background-image:
    radial-gradient(circle at 12% 8%, rgba(246,196,83,.25), transparent 38%),
    radial-gradient(circle at 88% 6%, rgba(199,127,160,.22), transparent 40%),
    radial-gradient(circle at 50% 120%, rgba(138,160,121,.25), transparent 55%);
  min-height:100dvh;
  font-weight:500;
  padding-bottom:env(safe-area-inset-bottom);
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

/* ---------- scenery / decorative ---------- */
.sun-badge{position:relative;width:62px;height:62px;flex:0 0 auto}
.sun-badge svg{width:100%;height:100%;display:block;animation:spin 26s linear infinite}
.sun-face{animation:none!important}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.sun-badge svg{animation:none}}

.wave{display:block;width:100%;height:18px}

/* ---------- auth gate ---------- */
.gate{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.gate-card{
  width:100%;max-width:430px;background:var(--card);border:3px solid var(--ink);
  border-radius:30px;box-shadow:var(--shadow);padding:34px 26px 30px;text-align:center;
}
.gate .logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
.brand{
  font-family:"Bagel Fat One",cursive;line-height:.95;
  background:linear-gradient(180deg,var(--orange),var(--rust));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:.5px;
}
.gate .brand{font-size:30px}
.gate p.sub{font-family:"Righteous";color:var(--mauve);letter-spacing:2px;text-transform:uppercase;font-size:12px;margin:2px 0 22px}
.field{display:block;text-align:left;font-family:"Righteous";font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);margin:0 0 6px 6px}
input[type=email],input[type=text],input[type=date],input[type=time],select,textarea{
  width:100%;padding:14px 16px;border:2.5px solid var(--line);background:var(--cream2);
  border-radius:16px;font-size:16px;color:var(--ink);font-weight:600;outline:none;transition:border-color .15s,box-shadow .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(226,112,58,.16)}
textarea{resize:vertical;min-height:78px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:"Righteous";letter-spacing:.6px;font-size:16px;
  padding:14px 22px;border-radius:18px;border:2.5px solid var(--ink);
  background:var(--orange);color:#fff;box-shadow:0 4px 0 var(--ink);
  transition:transform .08s, box-shadow .08s;width:100%
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
.btn.sun{background:var(--sun);color:var(--ink)}
.btn.sage{background:var(--sage);color:#fff}
.btn.ghost{background:var(--cream2);color:var(--ink);box-shadow:0 4px 0 var(--line);border-color:var(--line)}
.btn.mini{width:auto;padding:9px 14px;font-size:13px;border-radius:13px;box-shadow:0 3px 0 var(--ink)}
.btn.mini:active{box-shadow:0 1px 0 var(--ink)}
.note{font-size:13px;color:var(--ink2);margin-top:16px;line-height:1.5}
.gate-msg{margin-top:16px;font-weight:700;min-height:20px}
.gate-msg.ok{color:var(--olive)}.gate-msg.err{color:var(--rust)}

/* ---------- app shell ---------- */
.app{display:none;max-width:1000px;margin:0 auto;padding:0 14px 120px}
header.bar{
  position:sticky;top:0;z-index:30;margin:0 -14px 14px;padding:14px 16px 12px;
  background:var(--cream);border-bottom:3px solid var(--ink);
  box-shadow:0 6px 0 rgba(74,52,41,.06)
}
.bar-top{display:flex;align-items:center;gap:12px}
.bar-top .brand{font-size:24px;line-height:1}
.bar-top .who{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill-id{font-family:"Righteous";font-size:11px;letter-spacing:.5px;background:var(--cream2);border:2px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--ink2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.controls{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:6px}
.iconbtn{width:38px;height:38px;border-radius:12px;border:2.5px solid var(--ink);background:var(--card);display:grid;place-items:center;box-shadow:0 3px 0 var(--ink);font-size:18px;color:var(--ink)}
.iconbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.month-title{font-family:"Bagel Fat One";font-size:22px;color:var(--rust);min-width:172px;text-align:center}
.seg{display:flex;background:var(--cream2);border:2.5px solid var(--ink);border-radius:14px;overflow:hidden;box-shadow:0 3px 0 var(--ink)}
.seg button{font-family:"Righteous";font-size:13px;letter-spacing:.5px;padding:9px 14px;color:var(--ink2)}
.seg button.active{background:var(--mauve);color:#fff}
.spacer{flex:1}

/* members legend */
.members{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.mchip{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:2.5px solid var(--ink);border-radius:999px;padding:5px 12px 5px 6px;font-weight:700;font-size:13px;box-shadow:0 3px 0 rgba(74,52,41,.14)}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,0,0,.18);position:relative}
.dot::after{content:"";position:absolute;inset:4px;border-radius:50%;background:rgba(255,255,255,.55)}

/* ---------- calendar grid ---------- */
.cal{background:var(--card);border:3px solid var(--ink);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}
.dow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--orange)}
.dow span{font-family:"Righteous";text-align:center;color:#fff;font-size:12px;letter-spacing:1px;padding:9px 0}
.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}
.cell{min-height:98px;border-right:1.5px solid var(--line);border-bottom:1.5px solid var(--line);padding:5px 4px 6px;position:relative;background:var(--card);transition:background .12s;overflow:hidden;min-width:0}
.cell:nth-child(7n){border-right:none}
.cell.out{background:repeating-linear-gradient(45deg,#fbf4e6,#fbf4e6 8px,#f6eddb 8px,#f6eddb 16px);color:#bda88a}
.cell:active{background:var(--cream2)}
.daynum{font-weight:700;font-size:13px;color:var(--ink2);width:25px;height:25px;display:grid;place-items:center;border-radius:50%}
.cell.today .daynum{background:var(--orange);color:#fff;box-shadow:0 0 0 3px rgba(226,112,58,.22)}
.evs{display:flex;flex-direction:column;gap:3px;margin-top:3px;min-width:0}
.ev{font-size:11px;font-weight:700;color:#fff;padding:3px 7px;border-radius:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;border:1.5px solid rgba(0,0,0,.16);box-shadow:0 1.5px 0 rgba(0,0,0,.14)}
.ev.proposed{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.32),rgba(255,255,255,.32) 5px,transparent 5px,transparent 10px)}
.ev .tick{font-weight:900}
.more{font-size:10px;font-weight:800;color:var(--mauve);padding:1px 4px}

/* ---------- agenda ---------- */
.agenda{display:none;flex-direction:column;gap:18px}
.aday{background:var(--card);border:3px solid var(--ink);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
.aday-h{display:flex;align-items:baseline;gap:10px;padding:12px 16px;background:var(--cream2);border-bottom:2.5px solid var(--line)}
.aday-h .num{font-family:"Bagel Fat One";font-size:22px;color:var(--rust)}
.aday-h .lbl{font-family:"Righteous";letter-spacing:1px;text-transform:uppercase;font-size:12px;color:var(--ink2)}
.aday-h .today-tag{margin-left:auto;font-family:"Righteous";font-size:10px;letter-spacing:1px;background:var(--sun);color:var(--ink);padding:3px 9px;border-radius:999px;border:2px solid var(--ink)}
.arow{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1.5px solid var(--line)}
.arow:last-child{border-bottom:none}
.arow:active{background:var(--cream2)}
.arow .bar2{width:7px;align-self:stretch;border-radius:6px;min-height:34px}
.arow .time{font-weight:700;font-size:13px;color:var(--ink2);width:74px;flex:0 0 auto}
.arow .ttl{font-weight:700;flex:1;min-width:0}
.arow .ttl small{display:block;font-weight:600;color:var(--ink2);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.statustag{font-family:"Righteous";font-size:9px;letter-spacing:.5px;padding:3px 8px;border-radius:999px;border:2px solid currentColor;flex:0 0 auto}
.statustag.prop{color:var(--mauve)}
.statustag.conf{color:var(--olive)}
.rsvpmini{display:flex;gap:3px;flex:0 0 auto}
.rsvpmini .av{width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--ink);display:grid;place-items:center;font-size:9px;font-weight:800;color:#fff;margin-left:-7px}
.rsvpmini .av:first-child{margin-left:0}
.empty{text-align:center;padding:50px 20px;color:var(--ink2)}
.empty .big{font-size:46px;margin-bottom:6px}

/* ---------- FAB ---------- */
.fab{position:fixed;right:18px;bottom:calc(20px + env(safe-area-inset-bottom));width:64px;height:64px;border-radius:50%;background:var(--sun);border:3px solid var(--ink);box-shadow:0 6px 0 var(--ink),0 14px 22px rgba(74,52,41,.25);font-size:34px;color:var(--ink);display:none;place-items:center;z-index:35;line-height:0;font-weight:400}
.fab:active{transform:translateY(4px);box-shadow:0 2px 0 var(--ink)}

/* ---------- modal ---------- */
.scrim{position:fixed;inset:0;background:rgba(74,52,41,.45);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:50}
.scrim.open{display:flex}
.sheet{width:100%;max-width:520px;max-height:92dvh;overflow:auto;background:var(--cream);border:3px solid var(--ink);border-bottom:none;border-radius:28px 28px 0 0;box-shadow:0 -10px 40px rgba(74,52,41,.3);padding:8px 18px calc(26px + env(safe-area-inset-bottom))}
@media(min-width:560px){.scrim{align-items:center}.sheet{border-bottom:3px solid var(--ink);border-radius:28px;margin:16px}}
.grip{width:46px;height:5px;background:var(--line);border-radius:99px;margin:8px auto 14px}
.sheet h2{font-family:"Bagel Fat One";color:var(--rust);font-size:24px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.row{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.toggle{display:flex;align-items:center;gap:10px;background:var(--cream2);border:2.5px solid var(--line);border-radius:16px;padding:11px 14px;font-weight:700}
.toggle input{width:auto;margin-left:auto;transform:scale(1.35);accent-color:var(--orange)}
.statusseg{display:flex;gap:8px}
.statusseg label{flex:1;text-align:center;font-family:"Righteous";font-size:13px;letter-spacing:.5px;padding:11px;border-radius:14px;border:2.5px solid var(--line);background:var(--cream2);color:var(--ink2);cursor:pointer}
.statusseg input{display:none}
.statusseg input:checked+span{display:block}
.statusseg label:has(input:checked){background:var(--mauve);color:#fff;border-color:var(--ink)}
.swatchwrap{display:flex;gap:9px;flex-wrap:wrap}
.swatch{width:34px;height:34px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px var(--line);cursor:pointer}
.swatch.sel{box-shadow:0 0 0 2px var(--ink),0 0 0 6px rgba(226,112,58,.3);transform:scale(1.08)}

/* rsvp block in modal */
.rsvpbox{background:var(--cream2);border:2.5px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}
.rsvpbox h3{font-family:"Righteous";font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);margin:0 0 10px}
.rsvplist{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.rsvpitem{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
.rsvpitem .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;border:2px solid var(--ink)}
.rsvpitem .resp{margin-left:auto;font-family:"Righteous";font-size:11px;letter-spacing:.5px;padding:4px 10px;border-radius:999px;border:2px solid currentColor}
.r-going{color:var(--olive)} .r-maybe{color:var(--mustard)} .r-no{color:var(--rust)} .r-none{color:#b6a489}
.myrsvp{display:flex;gap:8px}
.myrsvp button{flex:1;font-family:"Righteous";font-size:13px;padding:11px;border-radius:14px;border:2.5px solid var(--ink);background:var(--card);color:var(--ink);box-shadow:0 3px 0 var(--ink)}
.myrsvp button:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.myrsvp button.on.going{background:var(--sage);color:#fff}
.myrsvp button.on.maybe{background:var(--mustard);color:var(--ink)}
.myrsvp button.on.no{background:var(--rose);color:#fff}
.sheet-actions{display:flex;gap:10px;margin-top:6px}
.sheet-actions .btn{flex:1}
.del{flex:0 0 auto!important;width:auto!important;background:var(--cream2);color:var(--rust);box-shadow:0 4px 0 var(--line);border-color:var(--line)}

/* toast */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);font-weight:700;padding:12px 20px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.25s;z-index:60;font-size:14px;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.banner{display:none;margin:0 0 12px;background:#fff4d6;border:2.5px dashed var(--rust);color:var(--rust);border-radius:16px;padding:12px 16px;font-weight:700;font-size:13px;line-height:1.5}
.installbtn{display:none}
</style>
</head>
<body>

<!-- ============ AUTH GATE ============ -->
<div class="gate" id="gate">
  <div class="gate-card">
    <div class="logo">
      <div class="sun-badge" id="gateSun"></div>
      <div class="brand">Kiser<br>Schedule Pro</div>
    </div>
    <p class="sub">★ the family groove ★</p>

    <div id="configWarn" class="banner" style="display:none"></div>

    <div class="row" style="margin-bottom:12px">
      <label class="field" for="emailIn">Your family email</label>
      <input id="emailIn" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" />
    </div>
    <button class="btn" id="sendLink">✦ Send me a magic link</button>
    <div class="gate-msg" id="gateMsg"></div>
    <p class="note">No passwords here. We email you a one-tap link.<br>Only approved family emails can peek at the calendar.</p>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app">
  <header class="bar">
    <div class="bar-top">
      <div class="sun-badge" id="barSun"></div>
      <div class="brand">Kiser Schedule</div>
      <div class="who">
        <button class="installbtn iconbtn" id="installBtn" title="Install app">⤓</button>
        <span class="pill-id" id="whoami">—</span>
        <button class="iconbtn" id="signout" title="Sign out">⏻</button>
      </div>
    </div>

    <div class="controls">
      <div class="month-nav">
        <button class="iconbtn" id="prevM">‹</button>
        <div class="month-title" id="monthTitle">—</div>
        <button class="iconbtn" id="nextM">›</button>
      </div>
      <button class="btn mini sun" id="todayBtn">Today</button>
      <div class="spacer" style="flex:1"></div>
      <div class="seg">
        <button id="viewMonth" class="active">Month</button>
        <button id="viewAgenda">Agenda</button>
      </div>
    </div>

    <div class="members" id="members"></div>
  </header>

  <div class="banner" id="appBanner"></div>

  <!-- month grid -->
  <div class="cal" id="calWrap">
    <div class="dow"><span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- agenda -->
  <div class="agenda" id="agenda"></div>

  <button class="fab" id="fab">+</button>
</div>

<!-- ============ EVENT SHEET ============ -->
<div class="scrim" id="scrim">
  <div class="sheet" id="sheet">
    <div class="grip"></div>
    <h2 id="sheetTitle">🌼 New plan</h2>

    <div class="row">
      <label class="field" for="fTitle">What's happening?</label>
      <input id="fTitle" type="text" placeholder="Soccer, dinner with Grandma…" />
    </div>

    <div class="row row2">
      <div>
        <label class="field" for="fDate">Date</label>
        <input id="fDate" type="date" />
      </div>
      <div>
        <label class="field" for="fMember">Whose plan?</label>
        <select id="fMember"></select>
      </div>
    </div>

    <div class="row">
      <label class="toggle" for="fAllDay">All day <input id="fAllDay" type="checkbox" /></label>
    </div>

    <div class="row row2" id="timeRow">
      <div>
        <label class="field" for="fStart">Starts</label>
        <input id="fStart" type="time" />
      </div>
      <div>
        <label class="field" for="fEnd">Ends</label>
        <input id="fEnd" type="time" />
      </div>
    </div>

    <div class="row">
      <label class="field">Color</label>
      <div class="swatchwrap" id="swatches"></div>
    </div>

    <div class="row">
      <label class="field" for="fLoc">Where</label>
      <input id="fLoc" type="text" placeholder="Optional" />
    </div>

    <div class="row">
      <label class="field" for="fNotes">Notes</label>
      <textarea id="fNotes" placeholder="Optional"></textarea>
    </div>

    <div class="row">
      <label class="field">Is it locked in?</label>
      <div class="statusseg">
        <label><input type="radio" name="status" value="proposed"><span></span>🤔 Proposed</label>
        <label><input type="radio" name="status" value="confirmed" checked><span></span>✓ Confirmed</label>
      </div>
    </div>

    <!-- RSVP / confirm block, only when editing -->
    <div class="rsvpbox" id="rsvpBox" style="display:none">
      <h3>Who's in?</h3>
      <div class="rsvplist" id="rsvpList"></div>
      <div class="myrsvp">
        <button data-r="going" id="rGoing">✓ I'm in</button>
        <button data-r="maybe" id="rMaybe">~ Maybe</button>
        <button data-r="no" id="rNo">✕ Can't</button>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn del" id="delBtn" style="display:none">Delete</button>
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

let editing=null;               // event being edited or null
let chosenColor=PALETTE[0];
let deferredPrompt=null;

/* ---------- tiny helpers ---------- */
const $=s=>document.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const pad=n=>String(n).padStart(2,"0");
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseYMD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
function fmtTime(t){ if(!t) return ""; let[h,m]=t.split(":").map(Number); const ap=h>=12?"pm":"am"; h=h%12||12; return m?`${h}:${pad(m)}${ap}`:`${h}${ap}`; }
function initials(name,email){ const n=(name||"").trim(); if(n){const p=n.split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();} return (email||"?")[0].toUpperCase(); }
function memberColor(email){ const m=members.find(x=>x.email?.toLowerCase()===(email||"").toLowerCase()); return m?.color; }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

/* ---------- sun mascot svg ---------- */
function sunSVG(){
  let rays=""; for(let i=0;i<8;i++){rays+=`<rect x="-7" y="-92" width="14" height="30" rx="7" fill="#EFA92E" transform="rotate(${i*45})"/>`;}
  return `<svg viewBox="-128 -128 256 256" xmlns="http://www.w3.org/2000/svg">
    <g>${rays}</g>
    <circle r="58" fill="#F6C453"/>
    <circle class="sun-face" cx="-20" cy="-9" r="6.5" fill="#4A3429"/>
    <circle class="sun-face" cx="20" cy="-9" r="6.5" fill="#4A3429"/>
    <circle cx="-34" cy="13" r="7" fill="#E59A9A" opacity=".65"/>
    <circle cx="34" cy="13" r="7" fill="#E59A9A" opacity=".65"/>
    <path d="M-22 17 Q0 39 22 17" stroke="#4A3429" stroke-width="7" fill="none" stroke-linecap="round"/>
  </svg>`;
}

/* =====================================================================
   AUTH
   ===================================================================== */
function gate(msg,kind){ const m=$("#gateMsg"); m.textContent=msg||""; m.className="gate-msg"+(kind?" "+kind:""); }

async function sendLink(){
  const email=$("#emailIn").value.trim().toLowerCase();
  if(!email||!email.includes("@")){ gate("Enter a real email, friend.","err"); return; }
  $("#sendLink").disabled=true; gate("Sending…");
  const {error}=await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo:location.href.split("#")[0] } });
  $("#sendLink").disabled=false;
  if(error){ gate(error.message,"err"); return; }
  gate("✦ Check your email and tap the magic link.","ok");
}

async function onSignedIn(){
  myEmail=(session.user.email||"").toLowerCase();
  // server-side gate: are we an approved family member?
  const {data:ok,error}=await sb.rpc("is_approved");
  if(error){ gate("Could not verify access: "+error.message,"err"); return; }
  if(!ok){
    gate(`${myEmail} isn't on the family list yet. Ask the household admin to add you.`,"err");
    await sb.auth.signOut(); return;
  }
  await loadMembers();
  const me=members.find(m=>m.email.toLowerCase()===myEmail);
  myName=me?.display_name||myEmail.split("@")[0];
  myColor=me?.color||PALETTE[0];
  $("#whoami").textContent=myName;
  $("#gate").style.display="none";
  $("#app").style.display="block";
  $("#fab").style.display="grid";
  subscribeLive();
  await refresh();
}

async function loadMembers(){
  const {data}=await sb.from("allowed_emails").select("email,display_name,color").order("display_name");
  members=(data||[]).map((m,i)=>({...m, email:m.email, color:m.color||PALETTE[i%PALETTE.length]}));
  // legend
  const wrap=$("#members"); wrap.innerHTML="";
  members.forEach(m=>{
    const c=el("span","mchip");
    c.innerHTML=`<span class="dot" style="background:${m.color}"></span>${m.display_name||m.email.split("@")[0]}`;
    wrap.appendChild(c);
  });
  // member dropdown
  const sel=$("#fMember"); sel.innerHTML="";
  const everyone=el("option"); everyone.value="__all__"; everyone.textContent="🏡 Everyone"; sel.appendChild(everyone);
  members.forEach(m=>{ const o=el("option"); o.value=m.email; o.textContent=m.display_name||m.email.split("@")[0]; sel.appendChild(o); });
}

/* =====================================================================
   DATA
   ===================================================================== */
function monthRange(){
  const start=new Date(cursor.getFullYear(),cursor.getMonth(),1);
  start.setDate(start.getDate()-start.getDay()-7);          // pad before
  const end=new Date(cursor.getFullYear(),cursor.getMonth()+1,0);
  end.setDate(end.getDate()+(6-end.getDay())+14);           // pad after
  return [ymd(start),ymd(end)];
}

async function refresh(){
  if(view==="agenda"){ await loadAgenda(); }
  else{ await loadMonth(); }
}

async function loadMonth(){
  const [a,b]=monthRange();
  await fetchEvents(a,b);
  renderMonth();
}

async function loadAgenda(){
  const today=ymd(new Date());
  const end=new Date(); end.setDate(end.getDate()+90);
  await fetchEvents(today,ymd(end));
  renderAgenda();
}

async function fetchEvents(from,to){
  const {data,error}=await sb.from("events")
    .select("*, event_confirmations(*)")
    .gte("event_date",from).lte("event_date",to)
    .order("event_date").order("all_day",{ascending:false}).order("start_time");
  if(error){ toast("Load error"); console.error(error); events=[]; return; }
  events=(data||[]).map(e=>({...e, confirmations:e.event_confirmations||[]}));
}

/* =====================================================================
   RENDER — MONTH
   ===================================================================== */
function renderMonth(){
  $("#monthTitle").textContent=`${MON[cursor.getMonth()]} ${cursor.getFullYear()}`;
  const grid=$("#grid"); grid.innerHTML="";
  const first=new Date(cursor.getFullYear(),cursor.getMonth(),1);
  const startGrid=new Date(first); startGrid.setDate(1-first.getDay());
  const today=new Date();

  const byDay={};
  events.forEach(e=>{ (byDay[e.event_date]??=[]).push(e); });

  for(let i=0;i<42;i++){
    const d=new Date(startGrid); d.setDate(startGrid.getDate()+i);
    const inMonth=d.getMonth()===cursor.getMonth();
    const cell=el("div","cell"+(inMonth?"":" out")+(sameDay(d,today)?" today":""));
    const dn=el("div","daynum"); dn.textContent=d.getDate(); cell.appendChild(dn);
    const list=byDay[ymd(d)]||[];
    const box=el("div","evs");
    list.slice(0,3).forEach(e=>{
      const p=el("div","ev"+(e.status==="proposed"?" proposed":""));
      p.style.background=e.color||memberColor(e.member)||"#999";
      const goin=(e.confirmations||[]).filter(c=>c.response==="going").length;
      p.innerHTML=(e.all_day?"":`<span style="opacity:.85">${fmtTime(e.start_time)} </span>`)+escapeHtml(e.title)+(goin?` <span class="tick">·${goin}✓</span>`:"");
      p.onclick=ev=>{ev.stopPropagation();openSheet(e);};
      box.appendChild(p);
    });
    if(list.length>3){ const m=el("div","more"); m.textContent=`+${list.length-3} more`; box.appendChild(m); }
    cell.appendChild(box);
    cell.onclick=()=>openSheet(null,d);
    grid.appendChild(cell);
  }
  $("#calWrap").style.display="block"; $("#agenda").style.display="none";
}

/* =====================================================================
   RENDER — AGENDA
   ===================================================================== */
function renderAgenda(){
  $("#monthTitle").textContent="Next 90 days";
  const wrap=$("#agenda"); wrap.innerHTML="";
  const today=new Date();
  if(!events.length){
    const e=el("div","empty"); e.innerHTML=`<div class="big">🌻</div><div style="font-weight:700">Nothing planned yet.</div><div>Tap the ✦ to add the first thing.</div>`;
    wrap.appendChild(e);
  }
  const byDay={};
  events.forEach(e=>{ (byDay[e.event_date]??=[]).push(e); });
  Object.keys(byDay).sort().forEach(dateStr=>{
    const d=parseYMD(dateStr);
    const card=el("div","aday");
    const h=el("div","aday-h");
    h.innerHTML=`<span class="num">${d.getDate()}</span><span class="lbl">${DOW[d.getDay()]} · ${MON[d.getMonth()]}</span>`+(sameDay(d,today)?`<span class="today-tag">TODAY</span>`:"");
    card.appendChild(h);
    byDay[dateStr].forEach(e=>{
      const r=el("div","arow"); r.onclick=()=>openSheet(e);
      const bar=el("div","bar2"); bar.style.background=e.color||memberColor(e.member)||"#999";
      const time=el("div","time"); time.textContent=e.all_day?"All day":fmtTime(e.start_time)||"—";
      const ttl=el("div","ttl"); ttl.innerHTML=`${escapeHtml(e.title)}<small>${e.location?"📍 "+escapeHtml(e.location):memberLabel(e.member)}</small>`;
      const st=el("div","statustag "+(e.status==="proposed"?"prop":"conf")); st.textContent=e.status==="proposed"?"PROPOSED":"CONFIRMED";
      r.append(bar,time,ttl,st);
      const going=(e.confirmations||[]).filter(c=>c.response==="going");
      if(going.length){
        const mini=el("div","rsvpmini");
        going.slice(0,4).forEach(c=>{const a=el("div","av");a.style.background=memberColor(c.member_email)||"#999";a.textContent=initials(c.member_name,c.member_email);mini.appendChild(a);});
        r.appendChild(mini);
      }
      card.appendChild(r);
    });
    wrap.appendChild(card);
  });
  $("#calWrap").style.display="none"; $("#agenda").style.display="flex";
}

function memberLabel(m){ if(!m||m==="__all__") return "🏡 Everyone"; const x=members.find(v=>v.email.toLowerCase()===m.toLowerCase()); return x?(x.display_name||x.email.split("@")[0]):m; }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* =====================================================================
   EVENT SHEET (add / edit / confirm)
   ===================================================================== */
function buildSwatches(){
  const w=$("#swatches"); w.innerHTML="";
  PALETTE.forEach(col=>{
    const s=el("div","swatch"+(col===chosenColor?" sel":"")); s.style.background=col;
    s.onclick=()=>{ chosenColor=col; [...w.children].forEach(c=>c.classList.remove("sel")); s.classList.add("sel"); };
    w.appendChild(s);
  });
}

function openSheet(ev,presetDate){
  editing=ev||null;
  $("#sheetTitle").textContent=ev?"🌼 Edit plan":"🌼 New plan";
  $("#fTitle").value=ev?ev.title:"";
  $("#fDate").value=ev?ev.event_date:(presetDate?ymd(presetDate):ymd(new Date()));
  $("#fMember").value=ev?(ev.member||"__all__"):(myEmail||"__all__");
  $("#fAllDay").checked=ev?!!ev.all_day:false;
  $("#fStart").value=ev?ev.start_time||"":"";
  $("#fEnd").value=ev?ev.end_time||"":"";
  $("#fLoc").value=ev?ev.location||"":"";
  $("#fNotes").value=ev?ev.notes||"":"";
  chosenColor=ev?(ev.color||memberColor(ev.member)||myColor):myColor;
  buildSwatches();
  document.querySelectorAll('input[name=status]').forEach(r=>r.checked=(r.value===(ev?ev.status:"confirmed")));
  toggleTimeRow();
  $("#delBtn").style.display=ev?"inline-flex":"none";

  // RSVP block
  const box=$("#rsvpBox");
  if(ev){ box.style.display="block"; renderRsvp(ev); } else { box.style.display="none"; }

  $("#scrim").classList.add("open");
}
function closeSheet(){ $("#scrim").classList.remove("open"); editing=null; }
function toggleTimeRow(){ $("#timeRow").style.display=$("#fAllDay").checked?"none":"grid"; }

function renderRsvp(ev){
  const list=$("#rsvpList"); list.innerHTML="";
  const map={}; (ev.confirmations||[]).forEach(c=>map[(c.member_email||"").toLowerCase()]=c.response);
  members.forEach(m=>{
    const r=map[m.email.toLowerCase()]||"none";
    const item=el("div","rsvpitem");
    const av=el("div","av"); av.style.background=m.color; av.textContent=initials(m.display_name,m.email);
    const nm=el("span"); nm.textContent=m.display_name||m.email.split("@")[0];
    const tag=el("span","resp r-"+r); tag.textContent={going:"In ✓",maybe:"Maybe",no:"Can't",none:"—"}[r];
    item.append(av,nm,tag); list.appendChild(item);
  });
  const mine=(ev.confirmations||[]).find(c=>(c.member_email||"").toLowerCase()===myEmail)?.response;
  ["going","maybe","no"].forEach(r=>{ const b=$("#r"+r[0].toUpperCase()+r.slice(1)); b.classList.toggle("on",mine===r); b.classList.add(r); });
}

async function setRsvp(resp){
  if(!editing) return;
  const row={ event_id:editing.id, member_email:myEmail, member_name:myName, response:resp, updated_at:new Date().toISOString() };
  const {error}=await sb.from("event_confirmations").upsert(row,{onConflict:"event_id,member_email"});
  if(error){ toast("Couldn't save RSVP"); console.error(error); return; }
  // update local
  editing.confirmations=(editing.confirmations||[]).filter(c=>(c.member_email||"").toLowerCase()!==myEmail);
  editing.confirmations.push(row);
  renderRsvp(editing);
  toast(resp==="going"?"You're in! ✓":resp==="maybe"?"Marked maybe":"Marked can't make it");
}

async function saveEvent(){
  const title=$("#fTitle").value.trim();
  if(!title){ toast("Give it a name 🌼"); return; }
  const allDay=$("#fAllDay").checked;
  const row={
    title,
    event_date:$("#fDate").value,
    all_day:allDay,
    start_time:allDay?null:($("#fStart").value||null),
    end_time:allDay?null:($("#fEnd").value||null),
    member:$("#fMember").value,
    color:chosenColor,
    location:$("#fLoc").value.trim()||null,
    notes:$("#fNotes").value.trim()||null,
    status:document.querySelector('input[name=status]:checked').value,
    created_by:myEmail
  };
  let error;
  if(editing){ ({error}=await sb.from("events").update(row).eq("id",editing.id)); }
  else{ ({error}=await sb.from("events").insert(row)); }
  if(error){ toast("Save failed"); console.error(error); return; }
  toast(editing?"Updated ✨":"Added to the calendar ✨");
  closeSheet(); await refresh();
}

async function deleteEvent(){
  if(!editing) return;
  if(!confirm("Delete this plan for everyone?")) return;
  const {error}=await sb.from("events").delete().eq("id",editing.id);
  if(error){ toast("Delete failed"); console.error(error); return; }
  toast("Deleted"); closeSheet(); await refresh();
}

/* =====================================================================
   LIVE (realtime)
   ===================================================================== */
function subscribeLive(){
  sb.channel("kiser-live")
    .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>refresh())
    .on("postgres_changes",{event:"*",schema:"public",table:"event_confirmations"},()=>refresh())
    .subscribe();
}

/* =====================================================================
   WIRING
   ===================================================================== */
function wire(){
  $("#gateSun").innerHTML=sunSVG();
  $("#barSun").innerHTML=sunSVG();

  $("#sendLink").onclick=sendLink;
  $("#emailIn").addEventListener("keydown",e=>{if(e.key==="Enter")sendLink();});
  $("#signout").onclick=async()=>{ await sb.auth.signOut(); location.reload(); };

  $("#prevM").onclick=()=>{ cursor.setMonth(cursor.getMonth()-1); refresh(); };
  $("#nextM").onclick=()=>{ cursor.setMonth(cursor.getMonth()+1); refresh(); };
  $("#todayBtn").onclick=()=>{ cursor=new Date(); cursor.setDate(1); if(view==="agenda"){view="month";setView();} refresh(); };
  $("#viewMonth").onclick=()=>{ view="month"; setView(); refresh(); };
  $("#viewAgenda").onclick=()=>{ view="agenda"; setView(); refresh(); };

  $("#fab").onclick=()=>openSheet(null,new Date());
  $("#scrim").onclick=e=>{ if(e.target===$("#scrim")) closeSheet(); };
  $("#cancelBtn").onclick=closeSheet;
  $("#saveBtn").onclick=saveEvent;
  $("#delBtn").onclick=deleteEvent;
  $("#fAllDay").onchange=toggleTimeRow;
  $("#rGoing").onclick=()=>setRsvp("going");
  $("#rMaybe").onclick=()=>setRsvp("maybe");
  $("#rNo").onclick=()=>setRsvp("no");

  $("#installBtn").onclick=async()=>{ if(!deferredPrompt)return; deferredPrompt.prompt(); deferredPrompt=null; $("#installBtn").style.display="none"; };
  window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; $("#installBtn").style.display="grid"; });
}
function setView(){
  $("#viewMonth").classList.toggle("active",view==="month");
  $("#viewAgenda").classList.toggle("active",view==="agenda");
}

/* =====================================================================
   BOOT
   ===================================================================== */
async function boot(){
  wire();
  if(SUPABASE_URL.startsWith("PASTE")||SUPABASE_ANON.startsWith("PASTE")){
    const w=$("#configWarn"); w.style.display="block";
    w.textContent="⚙️ Add your Supabase URL + anon key near the top of this file, then reload.";
    $("#sendLink").disabled=true; return;
  }
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{flowType:"implicit",detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}});
  let started=false;
  async function start(s){ if(started||!s) return; started=true; session=s; await onSignedIn(); }
  sb.auth.onAuthStateChange((_e,s)=>{ start(s); });
  const {data}=await sb.auth.getSession();
  start(data.session);

  if("serviceWorker" in navigator){
    try{ await navigator.serviceWorker.register("sw.js"); }catch(e){ /* offline cache optional */ }
  }
}
boot();
</script>
